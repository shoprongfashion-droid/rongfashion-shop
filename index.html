
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONG Fashion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #fff; padding-bottom: 70px; }
        header { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { height: 40px; }
        
        /* ব্যানার ফিক্স */
        .banner-container { width: 100%; height: 250px; background: #f9f9f9; }
        .banner-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .section-header { padding: 20px 10px; font-size: 20px; font-weight: bold; border-left: 6px solid #000; margin: 10px 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .card { border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
        .price { color: #d32f2f; font-weight: bold; margin: 5px 0; }
        .btn-buy { background: #000; color: #fff; border: none; padding: 8px; width: 100%; border-radius: 6px; cursor: pointer; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <header><img src="1780835307194.png" class="logo"></header>

    <div class="banner-container">
        <img src="1000005520.jpg" alt="Banner">
    </div>

    <div class="section-header">ছেলেদের টি-শার্ট</div>
    <div class="grid" id="men-section"></div>

    <div class="section-header">মেয়েদের থ্রি-পিস</div>
    <div class="grid" id="women-section"></div>

    <div class="nav-bar">
        <a href="#">🏠<br>Home</a>
        <a href="#">📁<br>Shop</a>
        <a href="#">⭐<br>Review</a>
        <a href="#">🛒<br>Cart</a>
    </div>

    <script>
        const menSec = document.getElementById('men-section');
        const womenSec = document.getElementById('women-section');

        // টি-শার্ট লুপ
        for(let i=1; i<=6; i++) {
            menSec.innerHTML += `
            <div class="card" style="background:${i%2==0 ? '#f0faff' : '#fff'}">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300" alt="T-Shirt">
                <p>T-Shirt ${i}</p>
                <p class="price">৳${500 + i*20}</p>
                <button class="btn-buy">Order Now</button>
            </div>`;
        }

        // থ্রি-পিস লুপ
        for(let i=1; i<=6; i++) {
            womenSec.innerHTML += `
            <div class="card" style="background:${i%2==0 ? '#fff0f5' : '#fff'}">
                <img src="https://images.unsplash.com/photo-1595777457583-95e059d505c6?w=300" alt="Three-Piece">
                <p>Three-Piece ${i}</p>
                <p class="price">৳${700 + i*30}</p>
                <button class="btn-buy">Order Now</button>
            </div>`;
        }
    </script>
</body>
</html>
