
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>RONG Fashion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { padding-bottom: 90px; }
        
        /* লোগো ও ব্যানার */
        header { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { height: 40px; }
        .banner { width: 100%; height: 200px; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }

        /* গ্রিড */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { border: 1px solid #eee; padding: 8px; border-radius: 10px; text-align: center; }
        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .btn { background: #25D366; color: #fff; border: none; padding: 8px; width: 100%; border-radius: 5px; font-weight: bold; margin-top: 5px; }

        /* ডেলিভারি সেকশন */
        .delivery-section { background: #f4f4f4; padding: 15px; margin: 15px; border-radius: 10px; border-left: 5px solid #25D366; }
        
        /* নিচের মেনুবার */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px; border-top: 2px solid #eee; }
        .nav-bar a { text-decoration: none; color: #555; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

    <header><img src="1780835307194.png" class="logo"></header>
    <div class="banner"><img src="1000005520.jpg"></div>

    <div class="grid" id="product-grid">
        </div>

    <div class="delivery-section">
        <h4>🚚 ডেলিভারি ও পেমেন্ট</h4>
        <p>✅ <b>পেমেন্ট:</b> ক্যাশ অন ডেলিভারি (COD)</p>
        <p>✅ <b>বিকাশ/নগদ:</b> ০১৭XXXXXXXX</p>
        <p>🚚 <b>সময়:</b> ঢাকা (২-৩ দিন), বাইরে (৩-৫ দিন)</p>
    </div>

    <div class="nav-bar">
        <a href="#">🏠<br>Home</a>
        <a href="#">🛒<br>Cart</a>
        <a href="#">⭐<br>Review</a>
        <a href="#">❤️<br>Favorite</a>
    </div>

    <script>
        const grid = document.getElementById('product-grid');
        for(let i=1; i<=20; i++) {
            grid.innerHTML += `
            <div class="card">
                <img src="1000005523.jpg">
                <p>T-Shirt ${i}</p>
                <button class="btn" onclick="order('T-Shirt ${i}')">Order</button>
            </div>`;
        }

        function order(product) {
            let phone = "88017xxxxxxxx"; 
            window.open("https://wa.me/" + phone + "?text=আমি কিনতে চাই: " + product, '_blank');
        }
    </script>
</body>
</html>
