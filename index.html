
<div class="card">
    <div class="product-img">[ Premium T-Shirt ]</div>
    <h3>Premium T-Shirt</h3>
    <div class="price">৳৭৯৯</div>
    
    <button onclick="addToWishlist('Premium T-Shirt')" style="background:none; border:none; color:red; cursor:pointer; font-size:18px;">❤️ Add to Wishlist</button>
    
    <a href="#order-section" class="buy-btn" style="margin-top:10px;">Order Now</a>
</div>

<section id="review-section" style="text-align:center; padding:40px 20px; background:#fff;">
    <h2>আমাদের সম্পর্কে কাস্টমারদের মতামত</h2>
    <p>আপনার রিভিউ দিতে নিচের বাটনে ক্লিক করুন:</p>
    <a href="আপনার_রিভিউ_গুগল_ফর্মের_লিংক" target="_blank" class="btn" style="background:#007bff; margin-top:15px;">রিভিউ দিন</a>
</section>

<script>
    function addToWishlist(productName) {
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        if(!wishlist.includes(productName)) {
            wishlist.push(productName);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            alert(productName + ' আপনার ফেভারিট লিস্টে যোগ হয়েছে!');
        } else {
            alert('এটি আগে থেকেই আপনার লিস্টে আছে!');
        }
    }
</script>
