
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONG Fashion | Premium Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f4f4f4; }
        
        /* Navbar */
        nav { background: #000; padding: 15px; text-align: center; color: #fff; }
        .logo-img { height: 50px; border-radius: 5px; }
        .menu { display: flex; justify-content: center; gap: 15px; margin-top: 10px; font-size: 13px; }
        .menu a { color: #fff; text-decoration: none; }

        /* Banner */
        .banner { width: 100%; height: 180px; background: #333; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; }

        /* Hot Deals */
        .section-title { padding: 15px; color: #d32f2f; font-weight: bold; font-size: 18px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #fff; padding: 10px; border-radius: 5px; text-align: center; border: 1px solid #ddd; }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 5px; }
        .price { font-weight: bold; color: #d32f2f; font-size: 18px; }
        .old-price { text-decoration: line-through; color: #888; font-size: 14px; }
        .btn-order { background: #000; color: #fff; padding: 10px; border: none; width: 100%; margin-top: 10px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

    <nav>
        <img src="1780835307194.png" class="logo-img" alt="Logo">
        <div class="menu">
            <a href="#">ছেলেদের পোশাক</a>
            <a href="#">মেয়েদের পোশাক</a>
            <a href="https://forms.gle/d3bWW9toUxJcLqF48">রিভিউ</a>
        </div>
    </nav>

    <div class="banner">Welcome to RONG Fashion</div>

    <h3 class="section-title">HOT DEALS OF THE DAY</h3>

    <div class="product-grid">
        <div class="card">
            <div style="background:#eee; height:140px; display:flex; align-items:center; justify-content:center;">ছবি ১</div>
            <p>Premium T-Shirt</p>
            <div>
                <span class="price">৳৭৯৯</span> <span class="old-price">৳১০০০</span>
            </div>
            <a href="https://forms.gle/rZYoKGf3LtqRJnMKA" target="_blank"><button class="btn-order">Order Now</button></a>
        </div>

        <div class="card">
            <div style="background:#eee; height:140px; display:flex; align-items:center; justify-content:center;">ছবি ২</div>
            <p>Exclusive Panjabi</p>
            <div>
                <span class="price">৳১৯৯৯</span> <span class="old-price">৳২৫০০</span>
            </div>
            <a href="https://forms.gle/rZYoKGf3LtqRJnMKA" target="_blank"><button class="btn-order">Order Now</button></a>
        </div>
    </div>

</body>
</html>
