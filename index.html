
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONG Fashion | Premium Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #fff; padding-bottom: 70px; }
        
        header { padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { height: 40px; }

        /* Banner */
        .banner-section { width: 100%; height: 250px; background: #eee; }
        .banner-section img { width: 100%; height: 100%; object-fit: cover; }

        .section-header { padding: 20px 10px; font-size: 20px; font-weight: bold; border-left: 6px solid #000; margin: 10px 5px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .card { border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .price { color: #d32f2f; font-weight: bold; margin: 8px 0; }
        .btn-buy { background: #000; color: #fff; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <header><img src="1780835307194.png" class="logo" alt="Logo"></header>

    <div class="banner-section">
        <img src="1000005520.jpg" alt="Couple Banner">
    </div>

    <div class="section-header">ছেলেদের কালেকশন (T-Shirts)</div>
    <div class="grid" id="men-section"></div>

    <div class="section-header">মেয়েদের কালেকশন (Three-Piece)</div>
    <div class="grid" id="women-section"></div>

    <nav class="nav-bar">
        <a href="#" class="nav-item">🏠<br>Home</a>
        <a href="#" class="nav-item">📁<br>Shop</a>
        <a href="https://forms.gle/d3bWW9toUxJcLqF48" class="nav-item">⭐<br>Review</a>
        <a href="https://forms.gle/rZYoKGf3LtqRJnMKA" class="nav-item">🛒<br>Cart</a>
    </nav>

    <script>
        const menSec = document.getElementById('men-section');
        const womenSec = document.getElementById('women-section');

        // ছেলেদের টি-শার্টের জন্য কালারফুল এবং ভিন্ন ডিজাইন
        for(let i=1; i<=10; i++) {
            menSec.innerHTML += `
            <div class="card" style="background-color: ${i % 2 == 0 ? '#f0faff' : '#fefefe'}">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300" alt="T-Shirt">
                <p>T-Shirt Design ${i}</p>
                <p class="price">৳${500 + (i * 20)}</p>
                <button class="btn-buy">Order Now</button>
            </div>`;
        }

        // মেয়েদের থ্রি-পিসের জন্য
        for(let i=1; i<=10; i++) {
            womenSec.innerHTML += `
            <div class="card" style="background-color: ${i % 2 == 0 ? '#fff0f5' : '#fefefe'}">
                <img src="https://images.unsplash.com/photo-1595777457583-95e059d505c6?w=300" alt="Three-Piece">
                <p>Premium 3-Piece ${i}</p>
                <p class="price">৳${750 + (i * 30)}</p>
                <button class="btn-buy">Order Now</button>
            </div>`;
        }
    </script>
</body>
</html>
