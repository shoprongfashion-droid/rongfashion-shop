
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONG Fashion | Premium Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #fff; padding-bottom: 70px; }
        
        header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { height: 50px; }

        .hero { width: 100%; height: 300px; background: url('https://images.unsplash.com/photo-1512436991641-6745612f260f?q=80&w=1000') no-repeat center center/cover; }

        .section-title { padding: 20px 10px; font-size: 20px; font-weight: bold; border-left: 5px solid #000; margin: 10px; }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .card { border: 1px solid #eee; padding: 10px; border-radius: 12px; text-align: center; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; }
        
        /* ছেলেদের জন্য আলাদা কালার ভ্যারিয়েশন */
        .card.men { background-color: #f0faff; } 
        .card.men-alt { background-color: #fff8f0; }

        .price { color: #d32f2f; font-weight: bold; margin: 8px 0; }
        .btn-order { background: #000; color: #fff; padding: 8px; border: none; width: 100%; border-radius: 6px; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #ddd; z-index: 1000; }
    </style>
</head>
<body>

    <header><img src="1780835307194.png" class="logo"></header>
    <section class="hero"></section>

    <h2 class="section-title">ছেলেদের কালেকশন</h2>
    <div class="product-grid" id="menGrid"></div>

    <h2 class="section-title">মেয়েদের কালেকশন</h2>
    <div class="product-grid" id="womenGrid"></div>

    <div class="bottom-nav">
        <a href="#">🏠<br>Home</a><a href="#">📂<br>Shop</a>
        <a href="https://forms.gle/d3bWW9toUxJcLqF48">⭐<br>Review</a><a href="https://forms.gle/rZYoKGf3LtqRJnMKA">🛒<br>Cart</a>
    </div>

    <script>
        const menGrid = document.getElementById('menGrid');
        const womenGrid = document.getElementById('womenGrid');

        // ছেলেদের পণ্য (বিভিন্ন ডিজাইন ও কালার)
        for (let i = 1; i <= 20; i++) {
            let className = i % 2 === 0 ? "men" : "men-alt";
            menGrid.innerHTML += `
            <div class="card ${className}">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300" alt="Men">
                <p>Men Design ${i}</p>
                <p class="price">৳${500 + (i * 25)}</p>
                <button class="btn-order">Order Now</button>
            </div>`;
        }

        // মেয়েদের পণ্য
        for (let i = 1; i <= 20; i++) {
            womenGrid.innerHTML += `
            <div class="card">
                <img src="https://images.unsplash.com/photo-1595777457583-95e059d505c6?w=300" alt="Women">
                <p>Women Style ${i}</p>
                <p class="price">৳${600 + (i * 20)}</p>
                <button class="btn-order">Order Now</button>
            </div>`;
        }
    </script>
</body>
</html>
