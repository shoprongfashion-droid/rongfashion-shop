<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONG Fashion | Premium Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #fdfdfd; padding-bottom: 70px; }
        
        header { padding: 10px; text-align: center; border-bottom: 1px solid #eee; background: #fff; }
        .logo { height: 40px; }

        .banner-section { width: 100%; height: 250px; }
        .banner-section img { width: 100%; height: 100%; object-fit: cover; }

        .section-header { padding: 20px 10px; font-size: 20px; font-weight: bold; border-left: 6px solid #000; margin: 10px 5px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        
        /* আলাদা ডিজাইনের কার্ড */
        .card { border-radius: 15px; padding: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.08); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; border: 2px solid #fff; }
        .price { color: #d32f2f; font-weight: bold; margin: 8px 0; font-size: 15px; }
        .btn-buy { background: #000; color: #fff; border: none; padding: 8px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <header><img src="1780835307194.png" class="logo"></header>

    <div class="banner-section">
        <img src="1000005520.jpg" alt="Fashion Banner">
    </div>

    <div class="section-header">ছেলেদের কালেকশন (T-Shirts)</div>
    <div class="grid" id="men-section"></div>

    <div class="section-header">মেয়েদের কালেকশন (Dresses)</div>
    <div class="grid" id="women-section"></div>

    <nav class="nav-bar">
        <a href="#" class="nav-item">🏠<br>Home</a>
        <a href="#" class="nav-item">📁<br>Shop</a>
        <a href="https://forms.gle/d3bWW9toUxJcLqF48" class="nav-item">⭐<br>Review</a>
        <a href="https://forms.gle/rZYoKGf3LtqRJnMKA" class="nav-item">🛒<br>Cart</a>
    </nav>

    <script>
        const menSec = document.getElementById('men-section');
        const womenSec = document.getElementById('women-section');
        const colors = ['#f0faff', '#fff5f5', '#f9f9f9', '#f0fff4', '#fff0f5'];

        for(let i=1; i<=10; i++) {
            menSec.innerHTML += `
            <div class="card" style="background:${colors[i % colors.length]}">
                <img src="https://picsum.photos/300/300?random=${i}" alt="Men">
                <p>Premium Tee ${i}</p>
                <p class="price">৳${500 + i*25}</p>
                <button class="btn-buy">Order Now</button>
            </div>`;
            
            womenSec.innerHTML += `
            <div class="card" style="background:${colors[(i+2) % colors.length]}">
                <img src="https://picsum.photos/300/300?random=${i+10}" alt="Women">
                <p>Elegant Dress ${i}</p>
                <p class="price">৳${600 + i*30}</p>
                <button class="btn-buy">Order Now</button>
            </div>`;
        }
    </script>
</body>
</html>
