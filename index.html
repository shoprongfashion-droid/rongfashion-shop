
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONG Fashion | Premium Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fff; padding-bottom: 70px; }
        
        /* Header & Logo */
        header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        .logo { height: 50px; }

        /* Banner Section (Home Page) */
        .hero { width: 100%; height: 350px; background: #ddd; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }

        /* Product Grid (50+ Items Capacity) */
        .container { padding: 15px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { border: 1px solid #f0f0f0; padding: 10px; border-radius: 8px; text-align: center; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .price { color: #d32f2f; font-weight: bold; margin: 5px 0; }
        .btn-order { background: #000; color: #fff; padding: 8px; border: none; width: 100%; border-radius: 4px; cursor: pointer; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #ddd; }
        .bottom-nav a { text-decoration: none; color: #333; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <img src="1780835307194.png" class="logo" alt="RONG Fashion">
    </header>

    <section class="hero">
        <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&q=80&w=800" alt="Model">
    </section>

    <div class="container">
        <h3 style="margin: 20px 0;">আমাদের কালেকশন</h3>
        <div class="product-grid" id="productContainer">
            </div>
    </div>

    <div class="bottom-nav">
        <a href="#">🏠<br>Home</a>
        <a href="#">📂<br>Shop</a>
        <a href="https://forms.gle/d3bWW9toUxJcLqF48">⭐<br>Review</a>
        <a href="https://forms.gle/rZYoKGf3LtqRJnMKA">🛒<br>Cart</a>
    </div>

    <script>
        // ৫০টি পণ্যের জন্য লুপ
        const container = document.getElementById('productContainer');
        for (let i = 1; i <= 50; i++) {
            container.innerHTML += `
            <div class="card">
                <div style="background:#eee; height:150px; margin-bottom:10px;">Product ${i}</div>
                <p>Premium Item ${i}</p>
                <p class="price">৳${(i * 100) + 500}</p>
                <a href="https://forms.gle/rZYoKGf3LtqRJnMKA" target="_blank"><button class="btn-order">Order Now</button></a>
            </div>`;
        }
    </script>
</body>
</html>
