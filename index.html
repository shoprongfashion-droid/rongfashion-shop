
<!DOCTYPE html>

        .banner { width: 100%; height: 180px; background: #222; display: flex; align-items: center; justify-content: center; color: #fff; text-align: center; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #ddd; z-index: 1000; }
        .bottom-nav a { text-decoration: none; color: #333; font-size: 12px; text-align: center; }
    </style>
</head>
