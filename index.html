<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONG Fashion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #fff; padding-bottom: 70px; }
        
        .logo-section { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        .logo-img { height: 40px; }

        .banner { width: 100%; height: 250px; }
        .banner img { width: 100%; height: 100%; object-fit: cover; }

        .section-title { padding: 20px 10px; font-size: 18px; font-weight: bold; border-left: 5px solid #000; margin: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #ddd; }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; }
        .price { color: #d32f2f; font-weight: bold; margin: 5px 0; }
        .btn-order { background: #000; color: #fff; border: none; padding: 8px; width: 100%; border-radius: 6px; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="logo-section"><img src="1780835307194.png" class="logo-img"></div>

    <div class="banner"><img src="1000005520.jpg"></div>

    <div class="section-title">ছেলেদের কালেকশন (T-Shirt)</div>
    <div class="grid" id="men-section"></div>

    <div class="section-title">মেয়েদের কালেকশন (Three-Piece)</div>
    <div class="grid" id="women-section"></div>

    <div class="bottom-nav">
        <span>🏠 Home</span><span>📁 Shop</span><span>⭐ Review</span><span>🛒 Cart</span>
    </div>

    <script>
        const menSec = document.getElementById('men-section');
        const womenSec = document.getElementById('women-section');

        // ছেলেদের টি-শার্ট
        for(let i=1; i<=4; i++) {
            menSec.innerHTML += `
            <div class="card" style="background: ${i%2==0 ? '#f0faff' : '#f5f5f5'}">
                <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300">
                <p>T-Shirt ${i}</p>
                <p class="price">৳${500 + i*20}</p>
                <button class="btn-order">Order Now</button>
            </div>`;
        }

        // মেয়েদের থ্রি-পিস
        for(let i=1; i<=4; i++) {
            womenSec.innerHTML += `
            <div class="card" style="background: ${i%2==0 ? '#fff0f5' : '#fefefe'}">
                <img src="https://images.unsplash.com/photo-1595777457583-95e059d505c6?w=300">
                <p>Three-Piece ${i}</p>
                <p class="price">৳${800 + i*50}</p>
                <button class="btn-order">Order Now</button>
            </div>`;
        }
    </script>
</body>
</html>
